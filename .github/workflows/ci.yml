name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true  # advisory only for now

      - name: Build (debug)
        run: cargo build --verbose

      - name: Build (release)
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Run doc tests
        run: cargo test --doc --verbose
        continue-on-error: true  # doc tests are best-effort

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true  # advisory only

  coverage:
    name: Coverage (Linux only)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate coverage
        # Skip tests whose value is lost or whose runtime is prohibitive under
        # coverage instrumentation:
        #   - timing: CT timing regression tests. Instrumentation inserts
        #     data-dependent counter increments per branch/edge, which itself
        #     introduces timing variance that dwarfs the CT properties tested.
        #   - statistics: rejection_sampling_statistics runs prove() 200x to
        #     characterize the rejection loop. Each prove() is ~10-20x slower
        #     under instrumentation, pushing runtime past the job timeout.
        #   - budget: prove_completes_within_iteration_budget runs prove() 100x
        #     for the same statistical reason.
        # All skipped tests are still run (without instrumentation) in the
        # Test job; they exercise the same prove()/verify() code paths as the
        # integration tests that DO run here, so coverage is not reduced.
        run: cargo llvm-cov --release --workspace --lcov --output-path lcov.info -- --skip timing --skip statistics --skip budget

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./lcov.info
          fail_ci_if_error: false
