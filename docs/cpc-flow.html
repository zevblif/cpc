<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPC Protocol Flow · Constrained Path Commitment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --bg-soft: #0f1422;
    --bg-card: #111726;
    --border: #1f2738;
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #00d4ff;
    --accent-soft: rgba(0, 212, 255, 0.12);
    --accent-glow: rgba(0, 212, 255, 0.35);
    --danger: #ff6b6b;
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* night-sky lab grid backdrop */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0, 212, 255, 0.08), transparent 70%),
      linear-gradient(rgba(0, 212, 255, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.025) 1px, transparent 1px);
    background-size: 100% 100%, 44px 44px, 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    height: 100vh;
    height: 100svh;
  }

  /* ---------- Header ---------- */
  header {
    padding: 22px 40px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 18px;
    flex-wrap: wrap;
    background: linear-gradient(180deg, rgba(0, 212, 255, 0.03), transparent);
  }
  .brand-mark {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 3px 9px;
    border-radius: 3px;
    opacity: 0.9;
  }
  h1 {
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  h1 .accent { color: var(--accent); }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    font-family: var(--font-mono);
  }

  /* ---------- Phase Tabs ---------- */
  .phases {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    gap: 4px;
    background: var(--bg-soft);
    overflow-x: auto;
  }
  .phase-tab {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 14px 18px;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .phase-tab .idx {
    font-size: 10px;
    opacity: 0.5;
  }
  .phase-tab:hover { color: var(--text); }
  .phase-tab.active {
    color: var(--accent);
  }
  .phase-tab.active::after {
    content: '';
    position: absolute;
    left: 18px;
    right: 18px;
    bottom: -1px;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  /* ---------- Main split ---------- */
  .main {
    display: grid;
    grid-template-columns: 60% 40%;
    overflow: hidden;
    min-height: 0;
  }

  /* ---------- Canvas ---------- */
  .canvas-wrap {
    position: relative;
    border-right: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .canvas {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-evenly;
    padding: 30px 40px;
    min-height: 0;
  }

  /* persistent connection lines */
  .links-svg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .links-svg line {
    stroke: rgba(0, 212, 255, 0.12);
    stroke-width: 1;
    stroke-dasharray: 3 5;
  }

  /* actor nodes */
  .actors {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-evenly;
    width: 100%;
    gap: 20px;
  }
  .actor {
    flex: 0 1 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 24px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-card);
    transition: opacity 0.35s, border-color 0.35s, transform 0.35s;
    position: relative;
    opacity: 0.4;
  }
  .actor.active {
    opacity: 1;
    border-color: var(--accent);
    transform: translateY(-2px);
    animation: pulse 2s ease-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.0), 0 0 22px rgba(0, 212, 255, 0.15); }
    50% { box-shadow: 0 0 0 6px rgba(0, 212, 255, 0.0), 0 0 30px rgba(0, 212, 255, 0.3); }
  }
  .actor .glyph {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 28px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid rgba(0, 212, 255, 0.3);
    margin-bottom: 12px;
    transition: background 0.35s, color 0.35s;
  }
  .actor.active .glyph {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 18px var(--accent-glow);
  }
  .actor .role {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
    color: var(--text);
  }
  .actor .role-zh {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }

  /* message animation layer */
  .msg-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }
  .msg-dot {
    position: absolute;
    width: 14px;
    height: 14px;
    margin-left: -7px;
    margin-top: -7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 14px 4px var(--accent-glow), 0 0 28px 8px rgba(0, 212, 255, 0.2);
    transition: transform 1.4s cubic-bezier(0.45, 0.05, 0.35, 1), opacity 0.3s;
    opacity: 0;
  }
  .msg-dot.flying { opacity: 1; }
  .msg-dot::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0.4;
    animation: ring 1.4s ease-out;
  }
  @keyframes ring {
    0% { transform: scale(0.6); opacity: 0.8; }
    100% { transform: scale(2.4); opacity: 0; }
  }
  .msg-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    transform-origin: left center;
    opacity: 0;
    transition: opacity 0.4s;
    box-shadow: 0 0 6px var(--accent-glow);
  }
  .msg-line.visible { opacity: 0.6; }
  .msg-label {
    position: absolute;
    transform: translate(-50%, -50%);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    background: var(--bg);
    border: 1px solid rgba(0, 212, 255, 0.4);
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.4s ease 0.3s;
    pointer-events: none;
  }
  .msg-label.visible { opacity: 1; }

  /* canvas status strip */
  .canvas-status {
    padding: 10px 40px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--bg-soft);
  }
  .canvas-status .step-code {
    color: var(--accent);
    font-weight: 600;
  }

  /* ---------- Markdown panel ---------- */
  .panel {
    overflow-y: auto;
    padding: 28px 32px 40px;
    background: var(--bg);
  }
  .panel::-webkit-scrollbar { width: 8px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .panel::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .md-host { animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .md-host h2 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .md-host h2 .num {
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    margin-right: 8px;
  }
  .md-host h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 22px 0 8px;
    font-family: var(--font-mono);
  }
  .md-host p {
    color: var(--text);
    margin-bottom: 10px;
    font-size: 14px;
  }
  .md-host ul, .md-host ol {
    margin: 0 0 14px 0;
    padding-left: 20px;
  }
  .md-host li {
    color: var(--text);
    margin-bottom: 6px;
    font-size: 14px;
    line-height: 1.6;
  }
  .md-host li::marker { color: var(--accent); }
  .md-host strong { color: var(--accent); font-weight: 600; }
  .md-host code {
    font-family: var(--font-mono);
    font-size: 12.5px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 3px;
  }
  .md-host pre {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    border-radius: 4px;
    padding: 12px 14px;
    overflow-x: auto;
    margin: 10px 0 14px;
  }
  .md-host pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text);
    font-size: 12.5px;
  }
  .md-host em { color: var(--muted); font-style: normal; font-family: var(--font-mono); font-size: 12px; }

  /* ---------- Controls ---------- */
  .controls {
    border-top: 1px solid var(--border);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--bg-soft);
    flex-wrap: wrap;
  }
  .ctrl-group { display: flex; align-items: center; gap: 8px; }
  .ctrl-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 38px;
    height: 38px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
    font-family: var(--font-mono);
  }
  .ctrl-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn.play {
    width: 44px;
    height: 44px;
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .ctrl-btn.play:hover { background: var(--accent); color: var(--bg); }
  .step-indicator {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--muted);
    min-width: 110px;
  }
  .step-indicator .cur { color: var(--accent); font-weight: 600; }
  .progress {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    min-width: 80px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), rgba(0, 212, 255, 0.5));
    transition: width 0.4s ease;
    box-shadow: 0 0 6px var(--accent-glow);
  }
  .speed-group { display: flex; align-items: center; gap: 6px; }
  .speed-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .speed-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .speed-btn:hover { color: var(--text); border-color: var(--muted); }
  .speed-btn.active {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  /* ---------- Language toggle ---------- */
  .lang-toggle {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 12px;
    transition: border-color 0.15s;
    align-self: center;
  }
  .lang-toggle:hover { border-color: var(--accent); }
  .lang-toggle span[data-lang] { color: var(--muted); transition: color 0.15s; }
  .lang-toggle span[data-lang].active { color: var(--accent); }
  .lang-toggle .lang-sep { color: var(--border); }

  /* ---------- Responsive ---------- */
  @media (max-width: 900px) {
    header { padding: 16px 20px 12px; gap: 10px; }
    h1 { font-size: 22px; }
    .phases { padding: 0 20px; }
    .phase-tab { padding: 12px 12px; font-size: 11px; }
    .main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    .canvas-wrap { border-right: none; border-bottom: 1px solid var(--border); }
    .canvas { padding: 20px; }
    .actor { flex: 0 1 120px; padding: 16px 10px; }
    .actor .glyph { width: 44px; height: 44px; font-size: 22px; }
    .actor .role { font-size: 12px; }
    .panel { padding: 20px; }
    .controls { padding: 12px 20px; gap: 12px; }
    .step-indicator { min-width: 90px; }
    .canvas-status { padding: 8px 20px; }
  }
  @media (max-width: 520px) {
    .actors { gap: 8px; }
    .actor { flex: 1; padding: 12px 6px; }
    .actor .glyph { width: 38px; height: 38px; font-size: 18px; }
    .actor .role-zh { display: none; }
    .speed-group { width: 100%; justify-content: flex-start; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <span class="brand-mark">CPC</span>
    <h1>Protocol <span class="accent">Flow</span></h1>
    <span class="subtitle" id="subtitle">Constrained Path Commitment · 后量子密码学协议交互式演示</span>
    <button class="lang-toggle" id="btnLang" title="Switch language / 切换语言">
      <span data-lang="zh" class="active">中文</span>
      <span class="lang-sep">|</span>
      <span data-lang="en">English</span>
    </button>
  </header>

  <nav class="phases" id="phases">
    <button class="phase-tab active" data-phase="0"><span class="idx">01</span>Setup</button>
    <button class="phase-tab" data-phase="1"><span class="idx">02</span>Commit</button>
    <button class="phase-tab" data-phase="2"><span class="idx">03</span>Prove</button>
    <button class="phase-tab" data-phase="3"><span class="idx">04</span>Verify</button>
  </nav>

  <div class="main">
    <section class="canvas-wrap">
      <div class="canvas" id="canvas">
        <svg class="links-svg" id="links"></svg>
        <div class="actors">
          <div class="actor" id="actor-issuer">
            <div class="glyph">I</div>
            <div class="role">Issuer</div>
            <div class="role-zh">签发者</div>
          </div>
          <div class="actor" id="actor-holder">
            <div class="glyph">H</div>
            <div class="role">Holder</div>
            <div class="role-zh">持有者</div>
          </div>
          <div class="actor" id="actor-verifier">
            <div class="glyph">V</div>
            <div class="role">Verifier</div>
            <div class="role-zh">验证者</div>
          </div>
        </div>
        <div class="msg-layer" id="msgLayer">
          <div class="msg-line" id="msgLine"></div>
          <div class="msg-dot" id="msgDot"></div>
          <div class="msg-label" id="msgLabel"></div>
        </div>
      </div>
      <div class="canvas-status">
        <span>NODE <span class="step-code" id="statusActor">—</span></span>
        <span id="statusMsg">awaiting step</span>
      </div>
    </section>

    <aside class="panel">
      <div class="md-host" id="mdHost"></div>
    </aside>
  </div>

  <footer class="controls">
    <div class="ctrl-group">
      <button class="ctrl-btn" id="btnPrev" title="上一步 (←)">⏮</button>
      <button class="ctrl-btn play" id="btnPlay" title="播放 / 暂停 (空格)">▶</button>
      <button class="ctrl-btn" id="btnNext" title="下一步 (→)">⏭</button>
    </div>
    <div class="step-indicator">Step <span class="cur" id="stepCur">1</span> / <span id="stepTotal">15</span></div>
    <div class="progress"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="speed-group">
      <span class="speed-label">Speed</span>
      <button class="speed-btn" data-speed="0.5">0.5×</button>
      <button class="speed-btn active" data-speed="1">1×</button>
      <button class="speed-btn" data-speed="2">2×</button>
      <button class="speed-btn" data-speed="4">4×</button>
    </div>
  </footer>

</div>

<script>
/* ============================================================
   CPC Protocol — full step dataset (15 steps across 4 phases)
   ============================================================ */
const STEPS = [
  /* ---------- Phase 1: Setup ---------- */
  {
    phase: 0,
    stepNum: "1.1",
    title: { zh: "生成公共参数 (a, b)", en: "Generate Public Parameters (a, b)" },
    actor: "issuer",
    message: null,
    markdown: {
      zh: `## 步骤 1.1：生成公共参数

**目的**：建立系统参数 \`a, b ∈ R²\`，所有后续协议都基于此。环 \`R = Z_q[x]/(x^256+1)\`，其中 \`q = 8380417\`、\`m = 256\`。

### 角色与动作
- **Issuer** 用 seed 通过 \`SHAKE-256\` 扩展生成 \`a, b ∈ R\`
- 每个系数通过**拒绝采样**读取 3 字节，拒绝 \`≥ q\` 的值，保证系数在 \`[0, q)\` 中均匀

### 技术保证
- \`SHAKE-256\` 作为可扩展输出函数（XOF），从任意长度 seed 生成均匀比特流
- 拒绝采样消除模偏差，保证 \`a, b\` 在 \`R\` 中统计均匀
- Ring-SIS 参数 \`(m=256, q=8380417)\` 与 CRYSTALS-Dilithium-III 同构，Core-SVP 估计 \`≥ 128-bit\` 经典安全`,
      en: `## Step 1.1: Generate Public Parameters

**Purpose**: Establish system parameters \`a, b ∈ R²\`, on which all subsequent protocol steps rely. The ring \`R = Z_q[x]/(x^256+1)\`, where \`q = 8380417\`, \`m = 256\`.

### Role & Action
- **Issuer** expands a seed via \`SHAKE-256\` to generate \`a, b ∈ R\`
- Each coefficient is read as 3 bytes via **rejection sampling**, rejecting values \`≥ q\`, ensuring coefficients are uniform in \`[0, q)\`

### Technical Guarantees
- \`SHAKE-256\` serves as an extensible output function (XOF), producing a uniform bitstream from a seed of arbitrary length
- Rejection sampling eliminates modular bias, ensuring \`a, b\` are statistically uniform in \`R\`
- Ring-SIS parameters \`(m=256, q=8380417)\` are isomorphic to CRYSTALS-Dilithium-III, with Core-SVP estimate \`≥ 128-bit\` classical security`
    }
  },

  /* ---------- Phase 2: Commit ---------- */
  {
    phase: 1,
    stepNum: "2.1",
    title: { zh: "路径编码 d_i", en: "Path Encoding d_i" },
    actor: "issuer",
    message: null,
    markdown: {
      zh: `## 步骤 2.1：路径编码

**目的**：把路径元素 \`p_i\` 编码为环元素 \`d_i ∈ R\`，使后续代数操作可行。

### 角色与动作
- 将路径元素的比特串**双射映射**为多项式系数
- 每系数 \`23 bit\`，256 个系数填满 \`R\`

### 技术保证
- 双射映射保证可逆性（Holder 可恢复原始路径）
- 编码在 \`[0, q)\` 内避免溢出
- 编码过程常数时间，不泄露路径长度信息`,
      en: `## Step 2.1: Path Encoding

**Purpose**: Encode path elements \`p_i\` as ring elements \`d_i ∈ R\`, enabling subsequent algebraic operations.

- Merkle tree structure: verification takes only \`O(log L)\` time, independent of \`L\`
- \`root\` is publicly bound during Setup, so any tampering of \`u_i\` will cause path verification to fail

> At this point, the complete CPC protocol flow ends: the Issuer has committed to the path, the Holder has generated a zero-knowledge proof, and the Verifier has verified the linear relations, shortness, and commitment integrity.`
    }
  }
];

const PHASE_NAMES = ["Setup", "Commit", "Prove", "Verify"];
const ACTOR_LABELS = { issuer: "ISSUER", holder: "HOLDER", verifier: "VERIFIER" };

/* i18n dictionary */
const I18N = {
  subtitle: {
    zh: 'Constrained Path Commitment · 后量子密码学协议交互式演示',
    en: 'Constrained Path Commitment · Interactive Post-Quantum Cryptographic Protocol Walkthrough'
  },
  btnPrev: { zh: '上一步 (←)', en: 'Previous (←)' },
  btnPlay: { zh: '播放 / 暂停 (空格)', en: 'Play / Pause (Space)' },
  btnNext: { zh: '下一步 (→)', en: 'Next (→)' },
  phaseTooltip: [
    { zh: 'Setup 阶段', en: 'Setup Phase' },
    { zh: 'Commit 阶段', en: 'Commit Phase' },
    { zh: 'Prove 阶段', en: 'Prove Phase' },
    { zh: 'Verify 阶段', en: 'Verify Phase' }
  ]
};

/* ============================================================
   State
   ============================================================ */
const state = {
  globalIdx: 0,    // 0..STEPS.length-1
  playing: false,
  lang: localStorage.getItem('cpc-lang') || 'zh',
  speed: 1,
  timer: null
};

/* flatten access helpers */
const totalSteps = STEPS.length;
document.getElementById('stepTotal').textContent = totalSteps;

function currentStep() { return STEPS[state.globalIdx]; }

function firstIndexOfPhase(phase) {
  for (let i = 0; i < STEPS.length; i++) if (STEPS[i].phase === phase) return i;
  return 0;
}
function lastIndexOfPhase(phase) {
  let idx = 0;
  for (let i = 0; i < STEPS.length; i++) if (STEPS[i].phase === phase) idx = i;
  return idx;
}

/* ============================================================
   Render
   ============================================================ */
const mdHost = document.getElementById('mdHost');
const msgDot = document.getElementById('msgDot');
const msgLine = document.getElementById('msgLine');
const msgLabel = document.getElementById('msgLabel');
const canvas = document.getElementById('canvas');

marked.setOptions({ breaks: true, gfm: true });

function applyI18n() {
  const lang = state.lang;
  document.getElementById('subtitle').textContent = I18N.subtitle[lang];
  document.getElementById('btnPrev').title = I18N.btnPrev[lang];
  document.getElementById('btnPlay').title = I18N.btnPlay[lang];
  document.getElementById('btnNext').title = I18N.btnNext[lang];
  document.querySelectorAll('.phase-tab').forEach(t => {
    t.title = I18N.phaseTooltip[Number(t.dataset.phase)][lang];
  });
  document.querySelectorAll('.lang-toggle span[data-lang]').forEach(s => {
    s.classList.toggle('active', s.dataset.lang === lang);
  });
}

function setLang(lang) {
  state.lang = lang;
  localStorage.setItem('cpc-lang', lang);
  applyI18n();
  render();
}

function render() {
  const step = currentStep();

  /* phase tabs */
  document.querySelectorAll('.phase-tab').forEach(t => {
    t.classList.toggle('active', Number(t.dataset.phase) === step.phase);
  });

  /* actors */
  ['issuer', 'holder', 'verifier'].forEach(a => {
    document.getElementById('actor-' + a).classList.toggle('active', a === step.actor);
  });

  /* status strip */
  document.getElementById('statusActor').textContent = ACTOR_LABELS[step.actor];
  document.getElementById('statusMsg').textContent = step.message
    ? `→ send: ${step.message.label}`
    : (step.phase === 3 ? 'verifying…' : 'local computation');

  /* markdown */
  const html = marked.parse(step.markdown[state.lang]);
  mdHost.innerHTML = html;
  mdHost.style.animation = 'none';
  void mdHost.offsetWidth;            /* reflow to restart animation */
  mdHost.style.animation = '';

  /* controls */
  document.getElementById('stepCur').textContent = state.globalIdx + 1;
  document.getElementById('progressFill').style.width =
    ((state.globalIdx + 1) / totalSteps * 100) + '%';
  document.getElementById('btnPrev').disabled = state.globalIdx === 0;
  document.getElementById('btnNext').disabled = state.globalIdx === totalSteps - 1;

  /* message animation */
  renderMessage(step);
}

/* ---------- message animation ---------- */
let msgTimer = null;

function renderMessage(step) {
  clearTimeout(msgTimer);
  msgDot.classList.remove('flying');
  msgLine.classList.remove('visible');
  msgLabel.classList.remove('visible');
  msgDot.style.transition = 'none';

  if (!step.message) return;

  const fromEl = document.getElementById('actor-' + step.message.from);
  const toEl   = document.getElementById('actor-' + step.message.to);
  const cRect = canvas.getBoundingClientRect();
  const fRect = fromEl.getBoundingClientRect();
  const tRect = toEl.getBoundingClientRect();

  const x1 = fRect.left + fRect.width / 2 - cRect.left;
  const y1 = fRect.top  + fRect.height / 2 - cRect.top;
  const x2 = tRect.left + tRect.width / 2 - cRect.left;
  const y2 = tRect.top  + tRect.height / 2 - cRect.top;
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;

  /* line */
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.hypot(dx, dy);
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;
  msgLine.style.left = x1 + 'px';
  msgLine.style.top = y1 + 'px';
  msgLine.style.width = len + 'px';
  msgLine.style.transform = `rotate(${angle}deg)`;

  /* dot start position */
  msgDot.style.left = x1 + 'px';
  msgDot.style.top = y1 + 'px';
  msgDot.style.transform = 'translate(0,0)';

  /* label */
  msgLabel.style.left = mx + 'px';
  msgLabel.style.top = (my - 18) + 'px';
  msgLabel.textContent = step.message.label;

  /* trigger animation on next frame */
  requestAnimationFrame(() => {
    msgLine.classList.add('visible');
    msgLabel.classList.add('visible');
    msgDot.style.transition = `transform ${1400 / state.speed}ms cubic-bezier(0.45,0.05,0.35,1), opacity 0.3s`;
    msgDot.classList.add('flying');
    msgDot.style.transform = `translate(${dx}px, ${dy}px)`;
  });
}

/* ============================================================
   Controls
   ============================================================ */
function goPrev() {
  if (state.globalIdx > 0) { state.globalIdx--; render(); }
}
function goNext() {
  if (state.globalIdx < totalSteps - 1) { state.globalIdx++; render(); }
  else { pause(); }
}
function jumpToPhase(phase) {
  state.globalIdx = firstIndexOfPhase(phase);
  render();
}
function play() {
  if (state.globalIdx === totalSteps - 1) { state.globalIdx = 0; render(); }
  state.playing = true;
  document.getElementById('btnPlay').textContent = '⏸';
  scheduleNext();
}
function pause() {
  state.playing = false;
  document.getElementById('btnPlay').textContent = '▶';
  clearTimeout(state.timer);
}
function togglePlay() { state.playing ? pause() : play(); }
function scheduleNext() {
  if (!state.playing) return;
  clearTimeout(state.timer);
  const step = currentStep();
  /* message steps need longer to let the animation finish */
  const base = step.message ? 2600 : 1800;
  state.timer = setTimeout(() => {
    if (state.globalIdx < totalSteps - 1) {
      state.globalIdx++;
      render();
      scheduleNext();
    } else {
      pause();
    }
  }, base / state.speed);
}

/* ---------- wire up ---------- */
document.getElementById('btnPrev').addEventListener('click', () => { pause(); goPrev(); });
document.getElementById('btnNext').addEventListener('click', () => { pause(); goNext(); });
document.getElementById('btnPlay').addEventListener('click', togglePlay);

document.querySelectorAll('.phase-tab').forEach(t => {
  t.addEventListener('click', () => { pause(); jumpToPhase(Number(t.dataset.phase)); });
});

document.querySelectorAll('.speed-btn').forEach(b => {
  b.addEventListener('click', () => {
    state.speed = Number(b.dataset.speed);
    document.querySelectorAll('.speed-btn').forEach(x => x.classList.toggle('active', x === b));
    if (state.playing) scheduleNext();
  });
});

document.getElementById('btnLang').addEventListener('click', () => {
  setLang(state.lang === 'zh' ? 'en' : 'zh');
});

/* keyboard shortcuts */
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight') { pause(); goNext(); }
  else if (e.key === 'ArrowLeft') { pause(); goPrev(); }
  else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
});

/* ============================================================
   Persistent connection lines (SVG, redrawn on resize)
   ============================================================ */
function drawLinks() {
  const svg = document.getElementById('links');
  svg.innerHTML = '';
  const cRect = canvas.getBoundingClientRect();
  const actors = ['issuer', 'holder', 'verifier'].map(a => {
    const el = document.getElementById('actor-' + a);
    const r = el.getBoundingClientRect();
    return {
      x: r.left + r.width / 2 - cRect.left,
      y: r.top + r.height / 2 - cRect.top
    };
  });
  /* issuer-holder and holder-verifier links */
  [[0,1],[1,2]].forEach(([i,j]) => {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', actors[i].x);
    line.setAttribute('y1', actors[i].y);
    line.setAttribute('x2', actors[j].x);
    line.setAttribute('y2', actors[j].y);
    svg.appendChild(line);
  });
}
window.addEventListener('resize', () => { drawLinks(); render(); });

/* ============================================================
   Init
   ============================================================ */
window.addEventListener('load', () => {
  drawLinks();
  applyI18n();
  render();
});
/* draw links as soon as layout is ready (fonts may shift positions) */
setTimeout(drawLinks, 100);
setTimeout(drawLinks, 500);
</script>
</body>
</html>
